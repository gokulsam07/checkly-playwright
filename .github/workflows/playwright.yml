name: Playwright Tests
run-name: Playwright Tests (${{ github.event.inputs.test_choice }}) ${{ github.event.inputs.custom_command }}
on:
  workflow_dispatch:
    inputs:
      test_choice:
        description: 'Select Suite'
        required: true
        default: 'ui'
        type: choice
        options: [ui, api]
      custom_command:
        description: 'Custom args (e.g., --grep @smoke). Leave empty for full suite.'
        required: false
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    environment: playwright-test
    env:
      AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
      ACC_ID: ${{ secrets.ACC_ID }}
      USER_GOKUL: ${{ secrets.USER_GOKUL }}
      GOKUL_PASSWORD: ${{ secrets.GOKUL_PASSWORD }}
      CI: true
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # --- Browser Caching ---
    - name: Get Playwright version
      id: playwright-version
      run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

    - name: Cache Playwright Browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

    - name: Install Playwright Chrome
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chrome --with-deps

    - name: Install OS Dependencies
      run: npx playwright install-deps chrome

    # --- Run Tests ---
    - name: Run Playwright
      run: |
        CHOICE="${{ github.event.inputs.test_choice }}"
        CUSTOM="${{ github.event.inputs.custom_command }}"
        if [ -z "$CUSTOM" ]; then
          npm run $CHOICE
        else
          npm run $CHOICE -- $CUSTOM
        fi
      continue-on-error: true

    # --- 10-Day Rolling History Logic ---
    - name: Load Allure History
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Build Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        gh_pages: gh-pages
        allure_report: allure-report
        allure_history: allure-history
        subfolder: ${{ github.event.inputs.test_choice }}
        keep_reports: 10 # This is your rolling window (only 10 latest runs kept)

    - name: Deploy to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-history
        # Keep results separate so UI and API don't mix
        destination_dir: playwright-${{ github.event.inputs.test_choice }}
        keep_files: true 

    # --- Cleanup Artifacts ---
    - name: Upload Results Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ github.event.inputs.test_choice }}
        path: allure-results
        overwrite: true

    - name: Output Report Link
      if: always()
      run: |
        echo "### Allure Report Ready! 🚀" >> $GITHUB_STEP_SUMMARY
        echo "Report for ${{ github.event.inputs.test_choice }} available here:" >> $GITHUB_STEP_SUMMARY
        echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.event.inputs.test_choice }}/index.html" >> $GITHUB_STEP_SUMMARY


        