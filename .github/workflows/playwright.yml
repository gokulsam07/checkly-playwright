name: Playwright Tests
env:
        API_KEY: ${{ secrets.CHECKLY_API_KEY }}
        ACCOUNT_ID: ${{ secrets.CHECKLY_ACCOUNT_ID }}
        USER_EMAIL: ${{ secrets.USER_EMAIL }}
        USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        CI: true
on:
  # This removes automatic triggers. Tests only run when you click "Run workflow"
  workflow_dispatch:
    inputs:
      test_choice:
        description: 'Choose which script to run'
        required: true
        default: 'ui'
        type: choice
        options:
          - ui
          - api
          - custom
      custom_command:
        description: 'If "custom" is selected, enter the full command (e.g., npm run ui -- --grep @smoke)'
        required: false
        default: ''

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # --- Browser Caching Logic ---
    - name: Get Playwright version
      id: playwright-version
      run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

    - name: Cache Playwright Browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

    # Download ONLY Chrome if cache is empty
    - name: Install Playwright Chrome
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chrome --with-deps

    # Ensure system dependencies (drivers/libraries) are ready
    - name: Install Playwright System Deps
      run: npx playwright install-deps chrome

    # --- Execution Logic ---
    - name: Run Playwright tests
      run: |
        if [ "${{ github.event.inputs.test_choice }}" == "custom" ]; then
          echo "Executing custom: ${{ github.event.inputs.custom_command }}"
          ${{ github.event.inputs.custom_command }}
        else
          echo "Executing: npm run ${{ github.event.inputs.test_choice }}"
          npm run ${{ github.event.inputs.test_choice }}
        fi
      
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30